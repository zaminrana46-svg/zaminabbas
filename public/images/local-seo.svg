<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#e05c00" stroke-width="2" opacity="0.1"/>
  
  <!-- Map pin -->
  <path d="M 50 20 C 40 20 32 28 32 38 C 32 52 50 75 50 75 C 50 75 68 52 68 38 C 68 28 60 20 50 20 Z" fill="none" stroke="#e05c00" stroke-width="2.5" stroke-linejoin="round"/>
  
  <!-- Center dot in pin -->
  <circle cx="50" cy="38" r="5" fill="#e05c00"/>
  
  <!-- Magnifying glass lines around -->
  <circle cx="50" cy="38" r="16" fill="none" stroke="#e05c00" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Location rings (radiating) -->
  <circle cx="50" cy="38" r="24" fill="none" stroke="#e05c00" stroke-width="1" opacity="0.4" stroke-dasharray="3,3"/>
  <circle cx="50" cy="38" r="32" fill="none" stroke="#e05c00" stroke-width="0.8" opacity="0.2" stroke-dasharray="4,4"/>
</svg>