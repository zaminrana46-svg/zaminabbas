<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#e05c00" stroke-width="2" opacity="0.1"/>
  
  <!-- Monitor/Screen -->
  <rect x="25" y="22" width="50" height="38" rx="2" fill="none" stroke="#e05c00" stroke-width="2.5"/>
  
  <!-- Screen stand -->
  <rect x="40" y="60" width="20" height="4" fill="#e05c00"/>
  <circle cx="35" cy="64" r="1.5" fill="#e05c00"/>
  <circle cx="65" cy="64" r="1.5" fill="#e05c00"/>
  
  <!-- Code brackets on screen -->
  <path d="M 35 32 L 32 38 L 35 44" fill="none" stroke="#e05c00" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 65 32 L 68 38 L 65 44" fill="none" stroke="#e05c00" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Gear/Settings wheel on screen -->
  <circle cx="50" cy="37" r="6" fill="none" stroke="#e05c00" stroke-width="1.5"/>
  <circle cx="50" cy="37" r="3.5" fill="#e05c00"/>
  
  <!-- Teeth on gear -->
  <line x1="50" y1="28" x2="50" y2="25" stroke="#e05c00" stroke-width="1.2"/>
  <line x1="50" y1="46" x2="50" y2="49" stroke="#e05c00" stroke-width="1.2"/>
  <line x1="59" y1="37" x2="62" y2="37" stroke="#e05c00" stroke-width="1.2"/>
  <line x1="41" y1="37" x2="38" y2="37" stroke="#e05c00" stroke-width="1.2"/>
</svg>